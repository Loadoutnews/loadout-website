name: Update News
on:
  schedule:
    - cron: "0 */6 * * *"   # alle 6 Stunden
  workflow_dispatch:         # manuell startbar über den "Run workflow"-Button

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python news_pipeline.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: python build_pages.py
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Automatisches News-Update"
          title: "🆕 Neue Artikel zur Prüfung"
          body: "Von der Pipeline automatisch generiert. Bitte vor dem Mergen kurz gegenlesen (Fakten, Ton, Kategorisierung)."
          branch: "auto-news-update"
