<script>
const CATS = { pc: "PC", konsole: "Konsolen", hardware: "Hardware", industrie: "Industrie" };
const GAMES = { gta: "GTA", minecraft: "Minecraft", fortnite: "Fortnite", cod: "Call of Duty", valorant: "Valorant / LoL", fifa: "FIFA / EA Sports FC" };

let allArticles = [];
let activeCat = "alle";
const BATCH_SIZE = 30;
let visibleCount = BATCH_SIZE;

function renderChips(){
  const chips = document.getElementById('chips');
  const cats = [{key:"alle", label:"Alle"}, ...Object.entries(CATS).map(([key,label]) => ({key, label}))];
  chips.innerHTML = cats.map(c =>
    `<button class="chip ${activeCat===c.key?'active':''}" onclick="setCat('${c.key}')">${c.label}</button>`
  ).join('');
}

function setCat(cat){
  activeCat = cat;
  visibleCount = BATCH_SIZE;
  renderChips();
  renderList();
}

function renderList(){
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const queryWords = query.split(/\s+/).filter(Boolean);

  const filtered = allArticles.filter(a => {
    const matchesCat = activeCat === "alle" || a.cat === activeCat;
    const searchableText = [a.title, a.teaser].filter(Boolean).join(" ").toLowerCase();
    const matchesQuery = queryWords.length === 0 || queryWords.every(w => searchableText.includes(w));
    return matchesCat && matchesQuery;
  });

  document.getElementById('countLabel').textContent =
    `${filtered.length} Artikel${activeCat !== "alle" ? " in " + CATS[activeCat] : ""}${query ? ` für "${query}"` : ""}`;

  const listEl = document.getElementById('archiveList');
  const emptyEl = document.getElementById('emptyState');
  const loadMoreBtn = document.getElementById('loadMoreBtn');

  if(filtered.length === 0){
    listEl.innerHTML = "";
    emptyEl.style.display = "block";
    loadMoreBtn.style.display = "none";
    return;
  }
  emptyEl.style.display = "none";

  const visible = filtered.slice(0, visibleCount);

  // Nach Monat gruppieren, damit man sich beim Browsen leichter orientiert
  let html = "";
  let lastMonth = null;
  visible.forEach(a => {
    const monthLabel = monthFromDateString(a.date);
    if(monthLabel !== lastMonth){
      html += `<div class="section-head" style="margin:26px 0 14px;"><h2 class="mono" style="font-size:11px; color:var(--muted);">${monthLabel}</h2><div class="rule"></div></div>`;
      lastMonth = monthLabel;
    }
    html += `
      <a href="artikel/${a.id}.html" class="release-card" style="text-decoration:none; color:inherit; display:flex; flex-direction:row; align-items:center; padding:14px 18px; margin-bottom:10px;">
        <div style="flex:1;">
          <span class="badge ${a.cat}" style="margin-bottom:6px;">${CATS[a.cat] || ''}${a.game ? ' · ' + (GAMES[a.game]||'') : ''}</span>
          <h3 style="font-size:15px; margin:4px 0 2px;">${a.title}</h3>
          <p style="font-size:12.5px; color:var(--muted); margin:0;">${a.teaser}</p>
        </div>
        <span class="mono" style="font-size:11px; color:var(--muted); white-space:nowrap; margin-left:14px;">${a.date}</span>
      </a>
    `;
  });
  listEl.innerHTML = html;

  loadMoreBtn.style.display = filtered.length > visibleCount ? "inline-block" : "none";
}

function monthFromDateString(dateStr){
  // Versucht, aus Datumsangaben wie "17. Juli 2026" oder "Juli 2026" grob
  // den Monat fürs Gruppieren zu extrahieren; bei Unklarheit einfach den
  // rohen String verwenden.
  const match = dateStr && dateStr.match(/([A-ZÄÖÜa-zäöü]+)\s+(\d{4})/);
  return match ? `${match[1]} ${match[2]}` : (dateStr || "Unbekannt");
}

function loadMore(){
  visibleCount += BATCH_SIZE;
  renderList();
}

fetch('archiv-index.json')
  .then(res => { if(!res.ok) throw new Error('not found'); return res.json(); })
  .then(data => {
    allArticles = Array.isArray(data) ? data : [];
    renderChips();
    renderList();
  })
  .catch(() => {
    document.getElementById('countLabel').textContent = 'Archiv konnte nicht geladen werden.';
  });
</script>
